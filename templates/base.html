{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Alke Wallet{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>

<header class="container my-3">
    <div class="d-flex align-items-center">
        <img src="{% static 'img/alke_wallet_logo.png' %}" alt="Logo" class="me-2" style="height:100px; border: 1px solid #ccc;">
        <h1 class="h3 mb-0">Billetera Digital Alke Wallet</h1>
    </div>
</header>

<nav class="navbar navbar-expand-lg bg-success" data-bs-theme="dark">
  <div class="container-fluid">
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="/">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/usuarios/">Usuarios</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/operaciones/">Operaciones</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/admin/">Admin</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<hr>

{% block content %}{% endblock %}

<footer class="mt-5 py-4" style="background-color: #2E4B3C; color: #E0E0E0;">
    <div class="container text-center">

        <div class="mb-3">
            <span class="ms-2 fw-bold">MiBilletera</span>
        </div>

        <div>
            &copy; {{ now|date:"Y" }} MiBilletera. Todos los derechos reservados.
        </div>
    </div>
</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
